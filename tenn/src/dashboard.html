<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>tenn · portfolio</title>
<style>
  :root { color-scheme: light dark;
    --bg:#ffffff; --card:#f6f7f9; --text:#111418; --muted:#6b7280; --line:#e5e8ec;
    --up:#0f9d58; --down:#e5484d; --chip:#eef1f5; --press:rgba(0,0,0,.045); --trend:var(--up); }
  @media (prefers-color-scheme: dark) { :root {
    --bg:#0d1014; --card:#171b21; --text:#eceef1; --muted:#8b93a1; --line:#242a33;
    --up:#00d05e; --down:#ff6369; --chip:#20252e; --press:rgba(255,255,255,.06); } }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent }
  html { font-size:16px }
  body { margin:0; font:1rem/1.5 -apple-system,"SF Pro Text","Segoe UI",sans-serif;
    background:var(--bg); color:var(--text) }
  .wrap { max-width:1040px; margin:0 auto;
    padding:calc(10px + env(safe-area-inset-top)) 16px calc(56px + env(safe-area-inset-bottom)) }
  .muted { color:var(--muted) } .num { font-variant-numeric:tabular-nums }
  header.top { padding:6px 0 2px } header.top h1 { font-size:1rem; margin:0; letter-spacing:.01em }
  header.top h1 span { color:var(--muted); font-weight:400 }

  /* Hero */
  .hero { margin-top:10px; animation:rise .35s ease }
  @keyframes rise { from { opacity:0; transform:translateY(6px) } to { opacity:1 } }
  #heroVal { font-size:clamp(1.9rem,8.5vw,2.6rem); font-weight:700; letter-spacing:-.02em; line-height:1.15 }
  #heroDelta { font-size:.95rem; font-weight:600; color:var(--trend); margin-top:2px }
  #heroDelta .lbl { color:var(--muted); font-weight:400 }
  .subline { font-size:.78rem; margin-top:4px }

  /* Chart */
  #chartWrap { margin-top:14px; display:none }
  #chart { position:relative; height:200px; touch-action:none; cursor:crosshair }
  #chart svg { display:block; width:100%; height:100% }
  #scrubDate { position:absolute; top:-4px; transform:translateX(-50%); font-size:.72rem;
    color:var(--muted); white-space:nowrap; display:none }
  #vline { position:absolute; top:14px; bottom:0; width:1px; background:var(--muted); opacity:.6; display:none }
  #dot { position:absolute; width:10px; height:10px; border-radius:50%; background:var(--trend);
    border:2px solid var(--bg); transform:translate(-50%,-50%); display:none }
  .pills { display:flex; gap:4px; margin-top:6px }
  .pill { font:inherit; font-size:.8rem; font-weight:600; min-height:40px; padding:0 14px;
    border:none; border-radius:999px; background:none; color:var(--muted); cursor:pointer }
  .pill[aria-pressed="true"] { color:var(--trend); background:var(--card) }

  section h2 { font-size:.75rem; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin:26px 0 8px }
  .commentary { background:var(--card); border-radius:14px; padding:14px 16px; font-size:.95rem; line-height:1.65 }

  /* Accounts */
  .accounts { display:flex; gap:8px; overflow-x:auto; scroll-snap-type:x proximity;
    margin:0 -16px; padding:2px 16px 8px; scrollbar-width:none }
  .accounts::-webkit-scrollbar { display:none }
  .acct { scroll-snap-align:start; flex:0 0 auto; min-width:150px; background:var(--card);
    border-radius:14px; padding:11px 13px }
  .acct .name { font-size:.72rem; color:var(--muted); max-width:180px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
  .acct .bal { font-size:1.05rem; font-weight:650; margin-top:2px }
  .acct .n { font-size:.68rem; color:var(--muted); margin-top:1px }
  .idot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:4px; vertical-align:1px }

  /* Controls + holdings list */
  .controls { display:flex; gap:8px; margin-bottom:10px }
  .controls input, .controls select { font:inherit; font-size:1rem; color:var(--text);
    background:var(--card); border:none; border-radius:12px; padding:9px 14px; min-height:44px }
  .controls input { flex:1; min-width:0 }
  .controls input:focus, .controls select:focus { outline:2px solid var(--trend); outline-offset:1px }
  .list { background:var(--card); border-radius:14px; overflow:hidden }
  .hrow, .row { display:grid; align-items:center; gap:10px; padding:0 14px;
    grid-template-columns:minmax(0,1.4fr) minmax(0,1fr) }
  .hrow { display:none }
  .row { min-height:60px; padding-top:9px; padding-bottom:9px; border-top:1px solid var(--line);
    cursor:pointer; transition:background .15s }
  .row:first-child { border-top:none }
  .row:active { background:var(--press) }
  .sym { min-width:0 } .sym strong { font-size:.95rem }
  .sym .desc { display:block; font-size:.72rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
  .sym .inst { display:block; font-size:.66rem; color:var(--muted); opacity:.9; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
  .val { text-align:right } .val strong { font-size:.95rem }
  .val .pnl { display:block; font-size:.72rem; font-weight:600 }
  .up { color:var(--up) } .down { color:var(--down) }
  .cell { display:none; text-align:right; font-size:.85rem }
  .detail { display:none; grid-column:1 / -1; padding:4px 0 10px;
    grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:8px; animation:rise .2s ease }
  .row.open .detail { display:grid }
  .kv .k { font-size:.65rem; text-transform:uppercase; letter-spacing:.05em; color:var(--muted) }
  .kv .v { font-size:.85rem }
  .chips { grid-column:1 / -1; display:flex; flex-wrap:wrap; gap:6px }
  .chip { font-size:.7rem; background:var(--chip); border-radius:999px; padding:4px 10px; color:var(--muted) }
  .more { width:100%; min-height:48px; font:inherit; font-weight:600; color:var(--trend);
    background:none; border:none; border-top:1px solid var(--line); cursor:pointer }
  @media (min-width:760px) {
    .hrow { display:grid } .hrow div { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em;
      color:var(--muted); text-align:right; padding:10px 0 }
    .hrow div:first-child { text-align:left }
    .hrow, .row { grid-template-columns:minmax(0,1.6fr) .8fr .8fr .8fr .6fr minmax(0,1fr) }
    .cell { display:block }
    .accounts { flex-wrap:wrap; overflow:visible; margin:0; padding:0 }
    .acct { min-width:190px; flex:1 1 190px }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top"><h1>tenn <span>· portfolio</span></h1></header>
  <div id="app" class="muted" style="margin-top:24px">Loading…</div>
</div>
<script>
const usd  = n => n.toLocaleString("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0});
const usdc = n => n.toLocaleString("en-US",{style:"currency",currency:"USD"});
const sgn  = (n,f) => (n>=0?"+":"−") + f(Math.abs(n));
const escq = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const fmtDay = d => new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
const PERIODS = { "1W":7, "1M":30, "3M":90, "ALL":Infinity };
const PERIOD_LBL = { "1W":"Past week", "1M":"Past month", "3M":"Past 3 months", "ALL":"All time" };
const state = { q:"", sort:"value", limit:40, doc:null, hist:[], period:"1M",
  instOrder:[], acctInst:new Map(), pts:[] };
const INST_COLORS = ["#2563eb","#d97706","#059669","#db2777","#7c3aed","#0891b2"];
function instColor(name) {
  let k = state.instOrder.indexOf(name);
  if (k < 0) { state.instOrder.push(name); k = state.instOrder.length - 1; }
  return INST_COLORS[k % INST_COLORS.length];
}
const instHtml = insts => (insts||[]).map(i =>
  `<span class="idot" style="background:${instColor(i)}"></span>${escq(i)}`).join('<span class="muted"> · </span>');

// ---------- hero + chart ----------
function periodSnaps() {
  const days = PERIODS[state.period];
  if (!isFinite(days)) return state.hist;
  const cutoff = Date.now() - days * 864e5;
  const xs = state.hist.filter(h => new Date(h.date+"T12:00:00").getTime() >= cutoff);
  return xs.length >= 2 ? xs : state.hist;
}
function setTrend(up) {
  document.documentElement.style.setProperty("--trend", up ? "var(--up)" : "var(--down)");
}
function heroSet(value, delta, base, label) {
  document.getElementById("heroVal").textContent = usdc(value);
  const el = document.getElementById("heroDelta");
  if (delta == null) { el.innerHTML = `<span class="lbl">${escq(label)}</span>`; return; }
  const pct = base ? ` (${sgn(delta/base*100, x=>x.toFixed(2))}%)` : "";
  el.innerHTML = `${sgn(delta, usd)}${pct} <span class="lbl">· ${escq(label)}</span>`;
}
function heroDefault() {
  const p = state.doc.payload;
  const snaps = periodSnaps();
  if (snaps.length >= 2) {
    const base = snaps[0].total, delta = p.total_value - base;
    setTrend(delta >= 0);
    heroSet(p.total_value, delta, base, PERIOD_LBL[state.period]);
  } else if (state.doc.prev_total != null) {
    const delta = p.total_value - state.doc.prev_total;
    setTrend(delta >= 0);
    heroSet(p.total_value, delta, state.doc.prev_total, "vs previous sync");
  } else {
    setTrend(true);
    heroSet(p.total_value, null, 0, "first sync");
  }
}
function drawChart() {
  const wrapEl = document.getElementById("chartWrap");
  const chart = document.getElementById("chart");
  const snaps = periodSnaps();
  if (snaps.length < 2) { wrapEl.style.display = "none"; return; }
  wrapEl.style.display = "block";
  const W = chart.clientWidth || 340, H = 200, PADT = 22, PADB = 8;
  const vals = snaps.map(s => s.total);
  const min = Math.min(...vals), max = Math.max(...vals), range = (max - min) || 1;
  const X = i => i / (vals.length - 1) * W;
  const Y = v => PADT + (1 - (v - min) / range) * (H - PADT - PADB);
  state.pts = vals.map((v, i) => ({ x: X(i), y: Y(v), v, date: snaps[i].date }));
  const line = state.pts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const baseY = Y(vals[0]).toFixed(1);
  chart.querySelector("svg").innerHTML = `
    <defs><linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="var(--trend)" stop-opacity=".18"/>
      <stop offset="100%" stop-color="var(--trend)" stop-opacity="0"/>
    </linearGradient></defs>
    <line x1="0" y1="${baseY}" x2="${W}" y2="${baseY}" stroke="var(--muted)" stroke-opacity=".45" stroke-dasharray="1 6" stroke-width="1"/>
    <polygon points="0,${H} ${line} ${W},${H}" fill="url(#fade)"/>
    <polyline points="${line}" fill="none" stroke="var(--trend)" stroke-width="2.25"
      stroke-linejoin="round" stroke-linecap="round"/>`;
}
function scrubAt(clientX) {
  const chart = document.getElementById("chart");
  const rect = chart.getBoundingClientRect();
  const frac = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
  const idx = Math.round(frac * (state.pts.length - 1));
  const p = state.pts[idx];
  if (!p) return;
  const base = state.pts[0].v;
  heroSet(p.v, p.v - base, base, fmtDay(p.date));
  const vline = document.getElementById("vline"), dot = document.getElementById("dot"),
        dateEl = document.getElementById("scrubDate");
  vline.style.display = dot.style.display = dateEl.style.display = "block";
  vline.style.left = p.x + "px";
  dot.style.left = p.x + "px"; dot.style.top = p.y + "px";
  dateEl.style.left = Math.min(Math.max(p.x, 28), (chart.clientWidth||340) - 28) + "px";
  dateEl.textContent = fmtDay(p.date);
}
function scrubEnd() {
  for (const id of ["vline","dot","scrubDate"]) document.getElementById(id).style.display = "none";
  heroDefault();
}
function wireChart() {
  const chart = document.getElementById("chart");
  let active = false;
  chart.addEventListener("pointerdown", e => { active = true; chart.setPointerCapture(e.pointerId); scrubAt(e.clientX); });
  chart.addEventListener("pointermove", e => { if (active) scrubAt(e.clientX); });
  chart.addEventListener("pointerup", () => { active = false; scrubEnd(); });
  chart.addEventListener("pointercancel", () => { active = false; scrubEnd(); });
  let t; addEventListener("resize", () => { clearTimeout(t); t = setTimeout(drawChart, 150); });
}
function setPeriod(pd) {
  state.period = pd;
  for (const b of document.querySelectorAll(".pill"))
    b.setAttribute("aria-pressed", b.dataset.pd === pd ? "true" : "false");
  heroDefault(); drawChart();
}

// ---------- holdings ----------
function rowsHtml(p) {
  let xs = p.positions.filter(x =>
    !state.q || x.symbol.toLowerCase().includes(state.q) || (x.description||"").toLowerCase().includes(state.q));
  const sorters = {
    value: (a,b)=>b.value-a.value,
    pnl: (a,b)=>(b.open_pnl??-1e15)-(a.open_pnl??-1e15),
    pnlpct: (a,b)=>((b.open_pnl!=null&&b.cost_basis?b.open_pnl/b.cost_basis:-1e15))-((a.open_pnl!=null&&a.cost_basis?a.open_pnl/a.cost_basis:-1e15)),
    symbol: (a,b)=>a.symbol.localeCompare(b.symbol),
  };
  xs = [...xs].sort(sorters[state.sort] || sorters.value);
  const total = xs.length;
  const shown = xs.slice(0, state.limit);
  const rows = shown.map(x => {
    const pnlPct = x.open_pnl!=null && x.cost_basis ? (x.open_pnl/x.cost_basis*100).toFixed(1)+"%" : "";
    const pnlCls = (x.open_pnl??0)>=0 ? "up":"down";
    return `<div class="row" data-sym="${escq(x.symbol)}" role="button" tabindex="0" aria-expanded="false">
      <div class="sym"><strong>${escq(x.symbol)}</strong>${x.description?`<span class="desc">${escq(x.description)}</span>`:""}${(x.institutions&&x.institutions.length)?`<span class="inst">${instHtml(x.institutions)}</span>`:""}</div>
      <div class="cell num">${(+x.units.toFixed(4)).toLocaleString()}</div>
      <div class="cell num muted">${x.avg_cost==null?"—":usdc(x.avg_cost)}</div>
      <div class="cell num">${x.price==null?"—":usdc(x.price)}</div>
      <div class="cell num muted">${(x.value/p.total_value*100).toFixed(1)}%</div>
      <div class="val num"><strong>${usd(x.value)}</strong>
        <span class="pnl ${x.open_pnl==null?"muted":pnlCls}">${x.open_pnl==null?"—":sgn(x.open_pnl,usd)}${pnlPct?" · "+pnlPct:""}</span>
      </div>
      <div class="detail">
        <div class="kv"><div class="k">Units</div><div class="v num">${(+x.units.toFixed(4)).toLocaleString()}</div></div>
        <div class="kv"><div class="k">Avg cost</div><div class="v num">${x.avg_cost==null?"—":usdc(x.avg_cost)}</div></div>
        <div class="kv"><div class="k">Price</div><div class="v num">${x.price==null?"—":usdc(x.price)}</div></div>
        <div class="kv"><div class="k">Cost basis</div><div class="v num">${x.cost_basis==null?"—":usd(x.cost_basis)}</div></div>
        <div class="kv"><div class="k">% of total</div><div class="v num">${(x.value/p.total_value*100).toFixed(1)}%</div></div>
        <div class="chips">${(x.accounts||[]).map(a=>{
          const inst = state.acctInst.get(a);
          return `<span class="chip">${escq(a)}${inst?` · ${escq(inst)}`:""}</span>`;
        }).join("")}</div>
      </div>
    </div>`;
  }).join("");
  const more = total > state.limit
    ? `<button class="more" id="more">Show all ${total} holdings</button>` : "";
  return `<div class="list">
    <div class="hrow"><div>Symbol</div><div>Units</div><div>Avg cost</div><div>Price</div><div>%</div><div>Value · P&L</div></div>
    ${rows || '<div class="row muted" style="cursor:default">No matches</div>'}${more}</div>`;
}

function render() {
  const app = document.getElementById("app");
  const doc = state.doc, p = doc.payload;
  const cb = p.total_cost_basis;
  const hasChart = state.hist.length >= 2;
  app.className = "";
  app.innerHTML = `
    <div class="hero">
      <div id="heroVal" class="num"></div>
      <div id="heroDelta" class="num"></div>
      ${cb ? `<div class="subline num muted">cost basis ${usd(cb)} ·
        <span class="${p.total_open_pnl>=0?"up":"down"}">open P&L ${sgn(p.total_open_pnl,usd)} (${(p.total_open_pnl/cb*100).toFixed(1)}%)</span>
        · updated ${new Date(doc.ingested_at).toLocaleString()}</div>`
      : `<div class="subline num muted">updated ${new Date(doc.ingested_at).toLocaleString()}</div>`}
    </div>
    <div id="chartWrap">
      <div id="chart"><svg aria-hidden="true"></svg>
        <span id="scrubDate" class="num"></span><div id="vline"></div><div id="dot"></div>
      </div>
      <div class="pills" role="group" aria-label="Chart period">
        ${Object.keys(PERIODS).map(pd=>`<button class="pill" data-pd="${pd}" aria-pressed="${pd===state.period}">${pd}</button>`).join("")}
      </div>
    </div>
    ${doc.commentary ? `<section><h2>Daily brief</h2><div class="commentary">${escq(doc.commentary)}</div></section>` : ""}
    <section><h2>Accounts</h2><div class="accounts">
      ${p.accounts.filter(a=>a.balance>0).sort((a,b)=>b.balance-a.balance).map(a=>`
        <div class="acct"><div class="name" title="${escq(a.name)}">${escq(a.name)}</div>
        <div class="bal num">${usd(a.balance)}</div>
        <div class="n">${a.institution?`<span class="idot" style="background:${instColor(a.institution)}"></span>${escq(a.institution)} · `:""}${a.positions_count} positions</div></div>`).join("")}
    </div></section>
    <section><h2>Holdings (${p.positions.length})</h2>
      <div class="controls">
        <input id="q" type="search" placeholder="Search symbol…" value="${escq(state.q)}" autocomplete="off">
        <select id="sort" aria-label="Sort">
          <option value="value">Value</option><option value="pnl">P&L $</option>
          <option value="pnlpct">P&L %</option><option value="symbol">A–Z</option>
        </select>
      </div>
      <div id="rows">${rowsHtml(p)}</div>
    </section>`;
  document.getElementById("sort").value = state.sort;
  heroDefault();
  if (hasChart) { drawChart(); wireChart(); }
  for (const b of document.querySelectorAll(".pill"))
    b.addEventListener("click", () => setPeriod(b.dataset.pd));
  wire();
}

function wire() {
  const q = document.getElementById("q");
  q.addEventListener("input", () => { state.q = q.value.trim().toLowerCase(); refreshRows(); });
  document.getElementById("sort").addEventListener("change", (e) => { state.sort = e.target.value; refreshRows(); });
  wireRows();
}
function refreshRows() {
  document.getElementById("rows").innerHTML = rowsHtml(state.doc.payload);
  wireRows();
}
function wireRows() {
  const rows = document.getElementById("rows");
  rows.onclick = (e) => {
    const more = e.target.closest("#more");
    if (more) { state.limit = 1e9; refreshRows(); return; }
    const row = e.target.closest(".row[data-sym]");
    if (row) { row.classList.toggle("open"); row.setAttribute("aria-expanded", row.classList.contains("open")); }
  };
  rows.onkeydown = (e) => {
    if (e.key !== "Enter" && e.key !== " ") return;
    const row = e.target.closest(".row[data-sym]");
    if (row) { e.preventDefault(); row.classList.toggle("open"); }
  };
}

async function main() {
  const app = document.getElementById("app");
  const [pRes, hRes] = await Promise.all([fetch("/api/portfolio"), fetch("/api/history")]);
  if (!pRes.ok) { app.textContent = "No data yet — waiting for first sync."; return; }
  state.doc = await pRes.json();
  state.hist = (hRes.ok ? await hRes.json() : []).sort((a,b)=>a.date<b.date?-1:1);
  for (const a of state.doc.payload.accounts || []) {
    if (a.institution) { instColor(a.institution); state.acctInst.set(a.name, a.institution); }
  }
  render();
}
main().catch(e => { document.getElementById("app").textContent = "Error: " + e.message; });
</script>
</body>
</html>
