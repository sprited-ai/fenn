# Deploys the tenn worker when its code changes on main.
# Requires repository secret: CLOUDFLARE_API_TOKEN (Workers Scripts:Edit,
# Workers Routes:Edit on the sprited.ai zone).
name: Deploy tenn

on:
  push:
    branches: [main]
    paths: ['tenn/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: tenn
