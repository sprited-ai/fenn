# Deploys the tenn worker when its code changes on main.
# Requires repository secret: CLOUDFLARE_API_TOKEN (Workers Scripts:Edit,
# Workers Routes:Edit on the sprited.ai zone).
name: Deploy tenn

on:
  push:
    branches: [main]
    paths: ['tenn/**']
  workflow_dispatch:

jobs:
  # secrets context is not available in job-level `if`, so probe via a step output.
  check-token:
    runs-on: ubuntu-latest
    outputs:
      has_token: ${{ steps.probe.outputs.has }}
    steps:
      - id: probe
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: echo "has=${TOKEN:+true}" >> "$GITHUB_OUTPUT"

  deploy:
    # Skip (grey, not red) until the CLOUDFLARE_API_TOKEN secret is configured.
    needs: check-token
    if: needs.check-token.outputs.has_token == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: tenn
