# Syncs portfolio data from SnapTrade and pushes it to tenn.sprited.ai.
# The worker stores the payload in KV and emails a summary to jin@sprited.ai.
#
# NOTE: this repo is public, so Actions logs are public too. Steps below
# deliberately suppress all output that could contain financial data.
#
# Required repository secrets:
#   SNAPTRADE_CLIENT_ID, SNAPTRADE_CONSUMER_KEY,
#   SNAPTRADE_USER_ID, SNAPTRADE_USER_SECRET,
#   TENN_INGEST_TOKEN
name: Sync portfolio

on:
  schedule:
    # 13:30 UTC weekdays = 6:30am PT (pre-market)
    - cron: '30 13 * * 1-5'
  workflow_dispatch:
    inputs:
      send_email:
        description: 'Send email summary'
        type: boolean
        default: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: cli/requirements.txt

      - name: Install dependencies
        run: pip install -q -r cli/requirements.txt

      - name: Sync from SnapTrade
        working-directory: cli
        env:
          SNAPTRADE_CLIENT_ID: ${{ secrets.SNAPTRADE_CLIENT_ID }}
          SNAPTRADE_CONSUMER_KEY: ${{ secrets.SNAPTRADE_CONSUMER_KEY }}
          SNAPTRADE_USER_ID: ${{ secrets.SNAPTRADE_USER_ID }}
          SNAPTRADE_USER_SECRET: ${{ secrets.SNAPTRADE_USER_SECRET }}
        # Public repo: keep account details out of the public log.
        run: |
          if python -m fenn sync > /dev/null 2>&1; then
            echo "sync: ok"
          else
            echo "sync: FAILED"; exit 1
          fi

      - name: Build site payload
        working-directory: cli
        run: |
          python build_site_payload.py -o /tmp/payload.json 2> /dev/null && echo "payload: ok"

      - name: Push to tenn.sprited.ai
        env:
          TENN_INGEST_TOKEN: ${{ secrets.TENN_INGEST_TOKEN }}
          SEND_EMAIL: ${{ github.event_name == 'schedule' && 'true' || inputs.send_email }}
        run: |
          EMAIL_FLAG=$([ "$SEND_EMAIL" = "true" ] && echo "" || echo "?email=0")
          # workers.dev, not the custom domain: Cloudflare Access fronts
          # tenn.sprited.ai and would 302 this request to the login page.
          # The endpoint itself is bearer-token protected.
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
            "https://tenn.jc524.workers.dev/api/ingest${EMAIL_FLAG}" \
            -H "Authorization: Bearer ${TENN_INGEST_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/payload.json)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "ingest: ok"
          else
            echo "ingest: FAILED (HTTP $HTTP_CODE)"; exit 1
          fi
